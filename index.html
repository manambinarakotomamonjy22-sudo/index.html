<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLS Kits Madagascar | Portfolio</title>
    <style>
        /* --- DESIGN PROFESSIONNEL --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            color: #333;
        }

        header {
            background: linear-gradient(45deg, #1a1a1a, #c1272d);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 { margin: 0; font-size: 2.2rem; }
        header p { opacity: 0.9; margin-top: 10px; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Cartes des Kits */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }

        .img-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #eee;
            position: relative;
        }

        .badge-v {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #27ae60;
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
        }

        .kit-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .card:hover .kit-img { transform: scale(1.1); }

        .card-content { padding: 20px; }

        .card-content h3 { margin: 0 0 10px; font-size: 1.1rem; color: #2c3e50; }

        /* Système de lien */
        .copy-section { display: flex; flex-direction: column; gap: 8px; }

        .url-field {
            width: 100%;
            padding: 8px;
            font-size: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
            color: #666;
            box-sizing: border-box;
        }

        .btn-copy {
            background: #e63946;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-copy:hover { background: #c1272d; }
        .btn-success { background: #2a9d8f !important; }

        footer { text-align: center; padding: 30px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>DLS KITS CREATIONS</h1>
        <p>Kits 512x512 prêts pour Dream League Soccer 2026</p>
    </header>

    <main class="grid-container">
        
        <div class="card">
            <div class="img-box">
                <span class="badge-v">512x512 OK</span>
                <img src="44206.jpg" alt="Kit DLS 44206" class="kit-img">
            </div>
            <div class="card-content">
                <h3>Madagascar Home Kit</h3>
                <div class="copy-section">
                    <input type="text" value="" data-file="44206.jpg" class="url-field" readonly>
                    <button class="btn-copy" onclick="copyAction(this)">COPIER LE LIEN</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box">
                <span class="badge-v">512x512 OK</span>
                <img src="44209.jpg" alt="Kit DLS 44209" class="kit-img">
            </div>
            <div class="card-content">
                <h3>Madagascar Away Kit</h3>
                <div class="copy-section">
                    <input type="text" value="" data-file="44209.jpg" class="url-field" readonly>
                    <button class="btn-copy" onclick="copyAction(this)">COPIER LE LIEN</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="img-box">
                <span class="badge-v">512x512 OK</span>
                <img src="44235.png" alt="Kit DLS 44235" class="kit-img">
            </div>
            <div class="card-content">
                <h3>Kit Spécial Edition</h3>
                <div class="copy-section">
                    <input type="text" value="" data-file="44235.png" class="url-field" readonly>
                    <button class="btn-copy" onclick="copyAction(this)">COPIER LE LIEN</button>
                </div>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 - Portfolio Développeur Fullstack EMIT</p>
    </footer>

    <script>
        // Génération automatique des URLs GitHub Pages
        document.addEventListener("DOMContentLoaded", function() {
            let currentUrl = window.location.href;
            let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf("/") + 1);

            document.querySelectorAll('.url-field').forEach(input => {
                const filename = input.getAttribute('data-file');
                if(filename) {
                    input.value = baseUrl + filename;
                }
            });
        });

        // Fonction de copie
        function copyAction(btn) {
            const input = btn.previousElementSibling;
            input.select();
            input.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(input.value);
            
            const oldText = btn.innerText;
            btn.innerText = "COPIÉ ! ✅";
            btn.classList.add('btn-success');
            
            setTimeout(() => {
                btn.innerText = oldText;
                btn.classList.remove('btn-success');
            }, 2000);
        }
    </script>

</body>
</html>
