<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barea DLS Kits | Portfolio Officiel</title>
    <style>
        /* --- STYLE CSS --- */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f4f7f6;
            color: #2c3e50;
        }

        header {
            background: linear-gradient(135deg, #1e1e1e 0%, #444 100%);
            color: white;
            text-align: center;
            padding: 70px 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        header h1 {
            margin: 0;
            font-size: 2.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        header p {
            margin: 10px 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 35px;
            padding: 50px;
            max-width: 1250px;
            margin: 0 auto;
        }

        /* Carte du Kit */
        .card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 25px rgba(0,0,0,0.07);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border: 1px solid #e1e8ed;
        }

        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 18px 45px rgba(0,0,0,0.18);
        }

        .image-container {
            width: 100%;
            overflow: hidden;
            background: #fdfdfd;
            aspect-ratio: 1 / 1;
            position: relative;
        }

        /* Badge de validation 512x512 */
        .status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(46, 204, 113, 0.9);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            z-index: 10;
        }

        .kit-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s ease;
        }

        .card:hover .kit-preview {
            transform: scale(1.08);
        }

        .card-info {
            padding: 25px;
        }

        .card-info h3 {
            margin: 0 0 18px 0;
            font-size: 1.35rem;
            color: #1a1a1a;
            font-weight: 700;
        }

        /* Zone de lien et bouton */
        .action-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .kit-url {
            width: 100%;
            padding: 12px;
            border: 1px dashed #ced4da;
            border-radius: 8px;
            background: #f8f9fa;
            font-size: 0.8rem;
            color: #6c757d;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        .btn-copy {
            background-color: #e63946; /* Rouge Madagascar */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .btn-copy:hover {
            background-color: #c1272d;
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
        }

        .btn-success {
            background-color: #2a9d8f !important;
            box-shadow: 0 5px 15px rgba(42, 157, 143, 0.4) !important;
        }

        @media (max-width: 650px) {
            .grid-container {
                padding: 20px;
                gap: 25px;
            }
            header {
                padding: 50px 15px;
            }
            header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>DLS KITS & LOGOS</h1>
        <p>Collection premium pour Madagascar Barea</p>
    </header>

    <main class="grid-container">
        
        <div class="card">
            <div class="image-container">
                <span class="status-badge">VALIDE 512x512</span>
                <img src="1ère-mailllot.jpg" alt="DLS Kit Madagascar Domicile" class="kit-preview">
            </div>
            <div class="card-info">
                <h3>Barea Domicile 25-26</h3>
                <div class="action-box">
                    <input type="text" value="" data-filename="1ère-mailllot.jpg" class="kit-url" readonly>
                    <button class="btn-copy" onclick="copyLink(this)">Copier le lien</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <span class="status-badge">VALIDE 512x512</span>
                <img src="2ème-mailllot.jpg" alt="DLS Kit Madagascar Extérieur" class="kit-preview">
            </div>
            <div class="card-info">
                <h3>Barea Extérieur 25-26</h3>
                <div class="action-box">
                    <input type="text" value="" data-filename="2ème-mailllot.jpg" class="kit-url" readonly>
                    <button class="btn-copy" onclick="copyLink(this)">Copier le lien</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="image-container">
                <span class="status-badge">VALIDE 512x512</span>
                <img src="Logo-fosa.jpg" alt="DLS Logo Fosa Juniors" class="kit-preview">
            </div>
            <div class="card-info">
                <h3>Logo Fosa Juniors</h3>
                <div class="action-box">
                    <input type="text" value="" data-filename="Logo-fosa.jpg" class="kit-url" readonly>
                    <button class="btn-copy" onclick="copyLink(this)">Copier le lien</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- SCRIPT D'AUTOMATISATION DES LIENS ---
        document.addEventListener("DOMContentLoaded", function() {
            let currentUrl = window.location.href;
            let baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf("/") + 1);
            const kitInputs = document.querySelectorAll('.kit-url');
            kitInputs.forEach(input => {
                const filename = input.getAttribute('data-filename');
                if(filename) {
                    input.value = baseUrl + filename;
                }
            });
        });

        // --- FONCTION DE COPIE ---
        function copyLink(btn) {
            const input = btn.previousElementSibling;
            input.select();
            input.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(input.value);
            const originalText = btn.innerText;
            btn.innerText = "Lien Copié ! ✅";
            btn.classList.add('btn-success');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('btn-success');
            }, 2500);
        }
    </script>
</body>
</html>
